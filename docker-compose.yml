version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: velluma-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  api-gateway:
    build:
      context: .
      dockerfile: apps/api-gateway/Dockerfile
    container_name: velluma-gateway
    ports:
      - "3001:3001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PORT=3001
    depends_on:
      - redis

  identity-service:
    build:
      context: .
      dockerfile: apps/identity-service/Dockerfile
    container_name: velluma-identity
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

volumes:
  redis_data:
